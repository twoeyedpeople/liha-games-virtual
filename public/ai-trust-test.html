<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Trust Test</title>
  <link rel="stylesheet" href="/viewport-guard.css" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/ai-trust-test.css" />
</head>

<body class="trust-test-body mode-holding" data-viewport-guard-min-width="1180">
  <main class="trust-test-app holding-screen">
    <section class="stage intro-welcome-stage" id="intro-welcome-stage">
      <div class="intro-corner intro-corner-left"></div>
      <div class="intro-corner intro-corner-right"></div>
      <div class="intro-welcome-shell">
        <header class="liha-topbar intro-welcome-topbar">
          <a href="/"><img src="/assets/images/linkedinLogo.svg" alt="LinkedIn" class="screen-logo liha-logo intro-linkedin-logo" /></a>
        </header>

        <div class="intro-welcome-hero with-scroll-indicator">
          <video class="side-shapes-video" autoplay muted loop playsinline preload="auto" aria-hidden="true">
            <source src="/assets/images/sideShapes.webm" type="video/webm" />
          </video>
          <img class="side-shapes-fallback" src="/assets/images/sideShapes.svg" alt="" aria-hidden="true" />
          <div class="intro-hero-dot"></div>
          <div class="intro-hero-square"></div>
          <div class="intro-hero-bar"></div>

          <div class="intro-welcome-copy">
            <h1>Welcome to the<br />AI Trust Test</h1>
            <p>You’ll gain confidence and trust to use and scale AI across your organisation through a true or false game.</p>
            <p id="intro-welcome-error" class="output"></p>
          </div>
        </div>

        <footer class="liha-footer intro-welcome-footer">
          <strong>AI Trust Test</strong>
          <button id="intro-get-started" class="footer-btn footer-btn-arrow intro-start-btn">
            <span>Get Started</span>
            <span class="footer-btn-arrow-bubble">
              <img src="/assets/images/arrow.svg" alt="" aria-hidden="true" />
            </span>
          </button>
        </footer>
      </div>
    </section>

    <section class="trust-stage trust-stage-game" id="trust-stage-game" aria-live="polite">
      <div class="intro-corner intro-corner-left"></div>
      <div class="intro-corner intro-corner-right"></div>
      <header class="trust-stage-header">
        <a href="/"><img src="/assets/images/linkedinLogo.svg" alt="LinkedIn" class="trust-logo" /></a>
      </header>

      <div class="trust-board-shell">
        <div class="trust-board" id="trust-board"></div>
      </div>

      <footer class="trust-footer" id="trust-footer">
        <div class="trust-footer-copy">
          <p id="trust-footer-message">Select the 14 correct AI statement cards.</p>
        </div>

        <div class="trust-progress" id="trust-progress" aria-label="Selection progress"></div>

        <button id="trust-submit-btn" class="trust-pill-btn trust-submit-btn is-disabled" type="button" disabled>
          <span id="trust-submit-label">Submit</span>
          <span class="trust-pill-icon">
            <img src="/assets/images/arrow.svg" alt="" aria-hidden="true" />
          </span>
        </button>
      </footer>
    </section>
  </main>

  <script src="/ai-trust-test.js"></script>
  <script src="/viewport-guard.js"></script>
</body>

</html>
