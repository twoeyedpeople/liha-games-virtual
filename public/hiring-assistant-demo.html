<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hiring Assistant Demo</title>
  <link rel="stylesheet" href="/viewport-guard.css" />
  <link rel="stylesheet" href="/hiring-assistant-demo.css" />
</head>

<body class="liha-demo-body">
  <main class="liha-demo-app">
    <section class="liha-demo-stage liha-demo-stage-active" id="liha-demo-intro">
      <header class="liha-demo-topbar">
        <img src="/assets/images/linkedinLogo.svg" alt="LinkedIn" class="liha-demo-logo" />
      </header>

      <div class="liha-demo-card liha-demo-intro-card">
        <div class="liha-demo-copy">
          <p class="liha-demo-headline">Get hands on with our simplified Hiring Assistant demo to see how it can automate recruiting workflows and save you time.</p>

          <div class="liha-demo-title-lockup">
            <span class="liha-demo-title-pill">Hiring</span>
            <span class="liha-demo-title-pill liha-demo-title-pill-wide">Assistant demo</span>
          </div>
        </div>

        <div class="liha-demo-art" aria-hidden="true">
          <span class="liha-demo-shape-blue"></span>
          <span class="liha-demo-shape-yellow"></span>
        </div>

        <button id="liha-demo-start" class="liha-demo-pill-btn" type="button">
          <span>Get Started</span>
          <span class="liha-demo-pill-icon">
            <img src="/assets/images/arrow.svg" alt="" aria-hidden="true" />
          </span>
        </button>
      </div>

      <footer class="liha-demo-footer">
        <p>Want to learn more about Hiring Assistant? Get in touch here</p>
        <a class="liha-demo-pill-btn liha-demo-footer-btn" href="https://business.linkedin.com/hire/hiring-assistant/contact-us" target="_blank" rel="noopener noreferrer">
          <span>View</span>
          <span class="liha-demo-pill-icon">
            <img src="/assets/images/arrow.svg" alt="" aria-hidden="true" />
          </span>
        </a>
      </footer>
    </section>

    <section class="liha-demo-stage" id="liha-demo-video">
      <header class="liha-demo-topbar">
        <img src="/assets/images/linkedinLogo.svg" alt="LinkedIn" class="liha-demo-logo" />
      </header>

      <div class="liha-demo-card liha-demo-video-card">
        <video class="liha-demo-video-player" controls preload="metadata" playsinline>
          <source src="/assets/videos/hiring-assistant-demo.mp4" type="video/mp4" />
          Your browser does not support the video tag.
        </video>
      </div>

      <footer class="liha-demo-footer">
        <p>Want to learn more about Hiring Assistant? Get in touch here</p>
        <a class="liha-demo-pill-btn liha-demo-footer-btn" href="https://business.linkedin.com/hire/hiring-assistant/contact-us" target="_blank" rel="noopener noreferrer">
          <span>View</span>
          <span class="liha-demo-pill-icon">
            <img src="/assets/images/arrow.svg" alt="" aria-hidden="true" />
          </span>
        </a>
      </footer>
    </section>
  </main>

  <script src="/hiring-assistant-demo.js"></script>
  <script src="/viewport-guard.js"></script>
</body>

</html>
