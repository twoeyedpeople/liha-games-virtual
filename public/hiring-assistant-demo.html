<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hiring Assistant Demo</title>
  <link rel="stylesheet" href="/viewport-guard.css" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/hiring-assistant-demo.css" />
  <script src="/ua-flags.js"></script>
</head>

<body class="liha-demo-body">
  <main class="liha-demo-app">
    <section class="liha-demo-stage liha-demo-stage-active" id="liha-demo-intro">
      <div class="intro-corner intro-corner-left"></div>
      <div class="intro-corner intro-corner-right"></div>
      <header class="liha-demo-topbar">
        <a href="/"><img src="/assets/images/linkedinLogo.svg" alt="LinkedIn" class="liha-logo screen-logo" /></a>
      </header>

      <div class="liha-demo-card liha-demo-intro-card">
        <div class="liha-demo-art" aria-hidden="true">
          <video class="side-shapes-video" autoplay muted loop playsinline preload="auto" aria-hidden="true">
            <source src="/assets/images/sideShapes.webm" type="video/webm" />
            <source src="/assets/images/sideShapes.mp4" type='video/mp4; codecs="hvc1"' />
          </video>
          <img class="side-shapes-fallback" src="/assets/images/sideShapes.svg" alt="" aria-hidden="true" />
        </div>

        <div class="liha-demo-copy">
          <h1>The future<br />of recruiting</h1>
          <p class="liha-demo-headline">Experience LinkedIn Hiring Assistant in action.<br />Save time sourcing and finding top talent.</p>

          <div class="liha-demo-contact">
            <p>Want to learn more about Hiring Assistant?</p>
            <a class="liha-demo-inline-link" href="https://business.linkedin.com/hire/hiring-assistant/contact-us" target="_blank" rel="noopener noreferrer">
              <span>Get in touch</span>
              <span class="liha-demo-inline-icon">
                <img src="/assets/images/arrow.svg" alt="" aria-hidden="true" />
              </span>
            </a>
          </div>
        </div>
      </div>

      <footer class="liha-demo-footer">
        <strong>Hiring Assistant Demo</strong>
        <button id="liha-demo-start" class="liha-demo-pill-btn" type="button">
          <span>Get Started</span>
          <span class="liha-demo-pill-icon">
            <img src="/assets/images/arrow.svg" alt="" aria-hidden="true" />
          </span>
        </button>
      </footer>
    </section>

    <section class="liha-demo-stage" id="liha-demo-video">
      <div class="intro-corner intro-corner-left"></div>
      <div class="intro-corner intro-corner-right"></div>
      <header class="liha-demo-topbar">
        <a href="/"><img src="/assets/images/linkedinLogo.svg" alt="LinkedIn" class="liha-logo screen-logo" /></a>
      </header>

      <div class="liha-demo-card liha-demo-video-card">
        <video class="liha-demo-video-player" controls preload="metadata" playsinline>
          <source src="/assets/videos/hiring-assistant-demo.mp4" type="video/mp4" />
          Your browser does not support the video tag.
        </video>
      </div>

      <footer class="liha-demo-footer">
        <strong>Hiring Assistant Demo</strong>
        <button id="liha-demo-done" class="liha-demo-pill-btn liha-demo-footer-btn" type="button">
          <span>Done</span>
          <span class="liha-demo-pill-icon">
            <img src="/assets/images/arrow.svg" alt="" aria-hidden="true" />
          </span>
        </button>
      </footer>
    </section>
  </main>

  <script src="/hiring-assistant-demo.js"></script>
  <script src="/viewport-guard.js"></script>
</body>

</html>
